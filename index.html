<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molecular Miner: Turbo Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui">
        <h2 id="score">⭐ Points: 0</h2>
        <h2 id="combo-display" style="color: #FF6B6B; display: none;">🔥 COMBO X1</h2>
        <h3 id="timer">⏰ Time: 05:00</h3>
        <p id="player-tag">Hero: <span id="user-display">---</span></p>
    </div>

    <button id="glossary-btn" onclick="toggleGlossary(true)">📖 Field Guide</button>

    <div id="start-overlay" class="modal" style="display: block;">
        <h1 style="color: #FFD93D; font-size: 40px; text-shadow: 3px 3px #FF6B6B;">MOLECULAR MINER</h1>
        <p>Enter your Hero Name to start!</p>
        <input type="text" id="student-name" placeholder="Your Name..." maxlength="15">
        <br>
        <button onclick="startGame()" style="font-size: 24px; margin-top: 20px;">START MISSION! 🚀</button>
    </div>

    <div id="quiz-overlay" class="modal">
        <h2 id="quiz-title" style="color: #6BCB77;">Scanning...</h2>
        <div id="quiz-desc"></div>
        <div id="options"></div>
    </div>

    <div id="glossary-overlay" class="modal">
        <h2 style="color: #4D96FF;">🔬 Science Secrets</h2>
        <p><b>Element:</b> Pure substance, one type of atom.</p>
        <p><b>Compound:</b> Atoms chemically bonded.</p>
        <p><b>Mixture:</b> Physically mixed, not bonded.</p>
        <button onclick="toggleGlossary(false)">Back to Play!</button>
    </div>

    <div id="victory-overlay" class="modal">
        <h1 style="color: #FFD93D;">🌈 MISSION COMPLETE!</h1>
        <h2 id="final-score-display">Total Stars: 0</h2>
        <button onclick="location.reload()">Play Again!</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="audioScript.js"></script>
    <script src="logicScript.js"></script>
</body>
</html>
